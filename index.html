<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Blog</title>
    <style>
        /* டார்க் தீம் டிசைன் */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        header { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            margin-right: 15px;
        }
        .header-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            color: #007bff;
        }
        
        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }

        /* சைட் பார் (Sidebar) */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 3;
            top: 0;
            left: 0;
            background-color: #1a1a1a;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #bbb;
            display: block;
            transition: 0.3s;
            border-bottom: 1px solid #2a2a2a;
        }
        .sidebar a:hover { color: #007bff; background-color: #222; }
        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 36px;
            border: none;
            background: none;
            color: #fff;
            cursor: pointer;
        }

        /* Google AdSense இடம் */
        .adsense-space {
            background-color: #1f1f1f;
            border: 1px dashed #444;
            color: #777;
            text-align: center;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* அட்மின் பகுதி */
        .admin-section {
            background-color: #1f1f1f;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .admin-section h3 { margin-top: 0; color: #007bff; }
        .admin-section input, .admin-section textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background-color: #2c2c2c;
            border: 1px solid #444; 
            color: #fff;
            border-radius: 5px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        .admin-section button { 
            background-color: #007bff; 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
        }
        .admin-section button:hover { background-color: #0056b3; }

        /* முகப்புப் பக்கம் (Blog Cards) */
        .blog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        .blog-card { 
            background: #1f1f1f; 
            border-radius: 10px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
            border: 1px solid #2a2a2a;
        }
        .blog-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 6px 15px rgba(0,123,255,0.2); 
        }
        .blog-card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
        }
        .blog-card h3 { 
            padding: 15px; 
            margin: 0; 
            font-size: 1.1em; 
            color: #eee; 
        }

        /* விரிவாகப் படிக்கும் பக்கம் (Detail View) */
        .detail-view { 
            display: none; 
            background: #1f1f1f; 
            padding: 25px; 
            border-radius: 10px; 
            border: 1px solid #2a2a2a;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn { 
            background-color: #333; color: #fff; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;
        }
        .back-btn:hover { background-color: #444; }
        
        /* Edit & Delete Buttons */
        .edit-btn { background-color: #ffc107; color: #000; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .edit-btn:hover { background-color: #e0a800; }
        .delete-btn { background-color: #dc3545; color: #fff; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background-color: #c82333; }

        .detail-view img { 
            width: 100%; 
            max-height: 400px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
        .detail-view h2 { color: #007bff; margin-top: 20px; font-size: 1.8em; }
        .detail-view p { 
            line-height: 1.8; 
            color: #ccc; 
            font-size: 1.1em;
            white-space: pre-wrap; 
        }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <button class="close-btn" onclick="closeNav()">×</button>
        <a href="#" onclick="goHome()">🏠 Home</a>
        <a href="#" onclick="goHome()">📰 News</a>
        <a href="#" onclick="goHome()">🌍 World</a>
        <a href="#" onclick="openAdminLogin()">🔒 Admin (Private)</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">☰</button>
        <h1 class="header-title">Shadow Blog</h1>
    </header>

    <div class="container">
        
        <div class="adsense-space" id="ads-section">
            [ Google AdSense விளம்பரங்களுக்கான இடம் ]
        </div>

        <div id="login-form" class="admin-section">
            <h3>Admin Login</h3>
            <p style="color:#aaa; font-size:14px;">பிளாக் போஸ்ட் செய்ய பாஸ்வேர்ட் உள்ளிடவும்</p>
            <input type="password" id="admin-pass" placeholder="Password (ex: shadow)">
            <button onclick="checkPassword()">Login</button>
            <button onclick="goHome()" style="background-color:#444; margin-left:10px;">Cancel</button>
        </div>

        <div id="admin-panel" class="admin-section">
            <h3 id="admin-title">புதிய போஸ்ட்டை உருவாக்கவும்</h3>
            <input type="text" id="post-title" placeholder="தலைப்பு (Title)">
            <input type="text" id="post-image" placeholder="படத்தின் லிங்க் (Image URL)">
            <textarea id="post-content" rows="8" placeholder="முழுமையான செய்தி அல்லது கட்டுரை..."></textarea>
            <button id="publish-btn" onclick="addPost()">Publish Post</button>
            <button onclick="goHome()" style="background-color:#444; margin-left:10px;">Close</button>
        </div>

        <div id="main-page">
            <div id="blog-list" class="blog-grid"></div>
        </div>

        <div id="detail-page" class="detail-view">
            <div class="top-bar">
                <button class="back-btn" onclick="goBack()">🔙 மீண்டும் முகப்புக்கு</button>
                <div>
                    <button class="edit-btn" onclick="requestAdmin('edit')">✏️ Edit</button>
                    <button class="delete-btn" onclick="requestAdmin('delete')">🗑️ Delete</button>
                </div>
            </div>
            <img id="detail-image" src="" alt="Blog Image">
            <h2 id="detail-title"></h2>
            <p id="detail-content"></p>
        </div>

    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('shadow_blog_posts')) || [];
        let currentIndex = -1; // எடிட் மற்றும் டெலீட் செய்ய உதவும் வேரியபிள்
        let editMode = false;

        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        function hideAllSections() {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("admin-panel").style.display = "none";
            document.getElementById("main-page").style.display = "none";
            document.getElementById("detail-page").style.display = "none";
            document.getElementById("ads-section").style.display = "block"; 
        }

        function goHome() {
            closeNav();
            hideAllSections();
            document.getElementById("main-page").style.display = "block";
            editMode = false; // முகப்புக்கு வரும்போது எடிட் மோடை கேன்சல் செய்துவிட வேண்டும்
            resetAdminPanel();
            renderPosts();
        }

        function openAdminLogin() {
            closeNav();
            hideAllSections();
            document.getElementById("ads-section").style.display = "none"; 
            document.getElementById("login-form").style.display = "block";
        }

        function checkPassword() {
            const pass = document.getElementById("admin-pass").value;
            if (pass === "shadow") { 
                document.getElementById("login-form").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
                document.getElementById("admin-pass").value = ""; 
            } else {
                alert("தவறான பாஸ்வேர்ட்!");
            }
        }

        function renderPosts() {
            const blogList = document.getElementById('blog-list');
            blogList.innerHTML = '';
            
            if(posts.length === 0) {
                blogList.innerHTML = '<p style="color:#777;">இன்னும் எந்தப் பதிவும் செய்யப்படவில்லை...</p>';
                return;
            }

            posts.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.onclick = () => showDetail(index);
                card.innerHTML = `<img src="${post.image}" alt="${post.title}"><h3>${post.title}</h3>`;
                blogList.appendChild(card);
            });
        }

        function showDetail(index) {
            currentIndex = index; // எந்த போஸ்ட் ஓப்பனில் இருக்கிறது என்பதை சேமிக்க
            const post = posts[index];
            
            document.getElementById('detail-title').innerText = post.title;
            document.getElementById('detail-image').src = post.image;
            document.getElementById('detail-content').innerText = post.content || 'இந்த பதிவுக்கு முழுமையான செய்தி இல்லை.'; 

            hideAllSections();
            document.getElementById("ads-section").style.display = "none"; 
            document.getElementById('detail-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // Edit அல்லது Delete பட்டனை அழுத்தினால் பாஸ்வேர்ட் கேட்கும் ஃபங்ஷன்
        function requestAdmin(action) {
            const pass = prompt("பாதுகாப்பு: அட்மின் பாஸ்வேர்டை உள்ளிடவும் (Password: shadow):");
            if(pass === "shadow") {
                if(action === 'delete') {
                    deletePost();
                } else if(action === 'edit') {
                    openEditMode();
                }
            } else if(pass !== null) {
                alert("தவறான பாஸ்வேர்ட்! உங்களால் இதை மாற்ற முடியாது.");
            }
        }

        // டெலீட் செய்யும் ஃபங்ஷன்
        function deletePost() {
            if(confirm("இந்த பதிவை உறுதியாக அழிக்க விரும்புகிறீர்களா? அழித்தால் திரும்பப் பெற முடியாது!")) {
                posts.splice(currentIndex, 1); // குறிப்பிட்ட பதிவை மட்டும் அழிக்கும்
                localStorage.setItem('shadow_blog_posts', JSON.stringify(posts));
                alert("பதிவு வெற்றிகரமாக அழிக்கப்பட்டது!");
                goHome();
            }
        }

        // எடிட் மோடை ஓபன் செய்யும் ஃபங்ஷன்
        function openEditMode() {
            editMode = true;
            const post = posts[currentIndex];
            
            // பழைய தகவல்களை பெட்டியில் நிரப்புவது
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-image').value = post.image;
            document.getElementById('post-content').value = post.content;
            
            // டைட்டில் மற்றும் பட்டன் பெயரை மாற்றுவது
            document.getElementById('admin-title').innerText = "பதிவை திருத்துக (Edit Post)";
            document.getElementById('publish-btn').innerText = "Update Post";

            hideAllSections();
            document.getElementById("ads-section").style.display = "none"; 
            document.getElementById("admin-panel").style.display = "block";
        }

        // போஸ்ட்டை சேமிக்கும் ஃபங்ஷன் (புதியது மற்றும் எடிட் இரண்டிற்கும்)
        function addPost() {
            const title = document.getElementById('post-title').value;
            const image = document.getElementById('post-image').value;
            const content = document.getElementById('post-content').value;

            if (title && image && content) {
                if(editMode) {
                    // எடிட் செய்தால் அதே இடத்தில் அப்டேட் ஆகும்
                    posts[currentIndex] = { title, image, content };
                    alert("பதிவு வெற்றிகரமாக திருத்தப்பட்டது!");
                } else {
                    // புதிதாக போட்டால் முதலில் சேரும்
                    posts.unshift({ title, image, content }); 
                    alert("பதிவு வெற்றிகரமாக சேர்க்கப்பட்டது!");
                }

                localStorage.setItem('shadow_blog_posts', JSON.stringify(posts));
                goHome(); 
            } else {
                alert("தயவுசெய்து தலைப்பு, படம் மற்றும் செய்தியை நிரப்பவும்!");
            }
        }

        // அட்மின் பேனலை பழையபடி மாற்றுவதற்கான ஃபங்ஷன்
        function resetAdminPanel() {
            document.getElementById('post-title').value = '';
            document.getElementById('post-image').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('admin-title').innerText = "புதிய போஸ்ட்டை உருவாக்கவும்";
            document.getElementById('publish-btn').innerText = "Publish Post";
        }

        function goBack() {
            goHome();
        }

        goHome();
    </script>
</body>
                </html>
