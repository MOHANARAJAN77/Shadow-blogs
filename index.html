<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Blog</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f7f6; 
        }
        header { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px 0; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }
        
        /* அட்மின் பகுதி (Admin Panel) */
        .admin-panel { 
            background: white; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
        }
        .admin-panel h3 { margin-top: 0; color: #333; }
        .admin-panel input, .admin-panel textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        .admin-panel button { 
            background-color: #007bff; 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .admin-panel button:hover { background-color: #0056b3; }

        /* முகப்புப் பக்கம் - பிளாக் கார்டுகள் (Blog List) */
        .blog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        .blog-card { 
            background: white; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            cursor: pointer; 
            transition: transform 0.3s, box-shadow 0.3s; 
        }
        .blog-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .blog-card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
        }
        .blog-card h3 { 
            padding: 15px; 
            margin: 0; 
            font-size: 1.2em; 
            color: #222; 
        }

        /* விரிவாகப் படிக்கும் பக்கம் (Detail View) */
        .detail-view { 
            display: none; /* ஆரம்பத்தில் மறைக்கப்பட்டிருக்கும் */
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .detail-view img { 
            width: 100%; 
            max-height: 450px; 
            object-fit: cover; 
            border-radius: 10px; 
        }
        .detail-view h2 { 
            color: #1a1a1a; 
            margin-top: 25px; 
            font-size: 2em;
        }
        .detail-view p { 
            line-height: 1.8; 
            color: #444; 
            font-size: 1.1em;
            white-space: pre-wrap; 
        }
        .back-btn { 
            background-color: #f1f1f1; 
            color: #333; 
            padding: 10px 15px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-bottom: 20px; 
            font-size: 16px;
            font-weight: bold;
        }
        .back-btn:hover { background-color: #e2e2e2; }
    </style>
</head>
<body>

    <header>
        <h1>Shadow Blog</h1>
    </header>

    <div class="container">
        
        <div id="main-page">
            <div class="admin-panel">
                <h3>புதிய போஸ்ட்டை உருவாக்கவும்</h3>
                <input type="text" id="post-title" placeholder="தலைப்பு (Title)">
                <input type="text" id="post-image" placeholder="படத்தின் லிங்க் (Image URL)">
                <textarea id="post-content" rows="6" placeholder="முழுமையான செய்தி அல்லது கதை (Content)"></textarea>
                <button onclick="addPost()">Post பண்ணவும்</button>
            </div>

            <div class="blog-grid" id="blog-list">
                </div>
        </div>

        <div id="detail-page" class="detail-view">
            <button class="back-btn" onclick="goBack()">🔙 மீண்டும் முகப்புப் பக்கத்திற்கு</button>
            <img id="detail-image" src="" alt="Blog Image">
            <h2 id="detail-title"></h2>
            <p id="detail-content"></p>
        </div>

    </div>

    <script>
        // ஏற்கனவே உள்ள போஸ்ட்களை லோக்கல் ஸ்டோரேஜில் இருந்து எடுப்பது
        let posts = JSON.parse(localStorage.getItem('shadow_blog_posts')) || [];

        // போஸ்ட்களை முகப்புப் பக்கத்தில் காண்பிக்கும் ஃபங்ஷன்
        function renderPosts() {
            const blogList = document.getElementById('blog-list');
            blogList.innerHTML = '';

            posts.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                // போஸ்ட்டைத் தொட்டால் விரிவான பக்கத்திற்குச் செல்லும்
                card.onclick = () => showDetail(index);

                card.innerHTML = `
                    <img src="${post.image}" alt="${post.title}">
                    <h3>${post.title}</h3>
                `;
                blogList.appendChild(card);
            });
        }

        // புதிய போஸ்ட்டை சேர்க்கும் ஃபங்ஷன்
        function addPost() {
            const title = document.getElementById('post-title').value;
            const image = document.getElementById('post-image').value;
            const content = document.getElementById('post-content').value;

            if (title && image) {
                // புதிய போஸ்ட்டை வரிசையில் முதலில் சேர்க்கிறது
                posts.unshift({ title, image, content }); 
                localStorage.setItem('shadow_blog_posts', JSON.stringify(posts));
                
                // பெட்டிகளை காலி செய்கிறது
                document.getElementById('post-title').value = '';
                document.getElementById('post-image').value = '';
                document.getElementById('post-content').value = '';
                
                renderPosts();
                alert('போஸ்ட் வெற்றிகரமாக சேர்க்கப்பட்டது!');
            } else {
                alert('தலைப்பு மற்றும் படத்தின் லிங்க் கட்டாயம் தேவை!');
            }
        }

        // விரிவாகப் படிக்கும் பக்கத்தைக் காட்டும் ஃபங்ஷன்
        function showDetail(index) {
            const post = posts[index];
            
            // அந்தந்த போஸ்ட்டின் தகவல்களைச் செட் செய்கிறது
            document.getElementById('detail-title').innerText = post.title;
            document.getElementById('detail-image').src = post.image;
            
            // பழைய போஸ்ட்களில் 'Content' இல்லை என்றால் அதற்கான மாற்று வாசகம்
            document.getElementById('detail-content').innerText = post.content || 'இந்த பதிவுக்கு இன்னும் முழுமையான செய்தி சேர்க்கப்படவில்லை.'; 

            // முகப்புப் பக்கத்தை மறைத்துவிட்டு, படிக்கும் பக்கத்தைக் காட்டுகிறது
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'block';
            
            // பக்கத்தின் மேலே கொண்டு செல்லும்
            window.scrollTo(0, 0);
        }

        // மீண்டும் முகப்புப் பக்கத்திற்குச் செல்லும் ஃபங்ஷன்
        function goBack() {
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('detail-page').style.display = 'none';
        }

        // பக்கம் திறந்தவுடன் போஸ்ட்களைக் காட்ட
        renderPosts();
    </script>
</body>
</html>
