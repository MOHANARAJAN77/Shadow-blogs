<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shadow Blogs</title>
<!-- Google AdSense placeholder (replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
  /* ═══════════════════════════════════════════
     RESET & BASE
  ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0a0a0f;
    --surface:    #12121a;
    --surface2:   #1a1a26;
    --border:     #2a2a3a;
    --accent:     #ff4d1c;
    --accent2:    #ff8c42;
    --text:       #e8e4dc;
    --text-muted: #6e6d7a;
    --sidebar-w:  260px;
    --header-h:   56px;
    --radius:     12px;
    --font-display: 'Georgia', serif;
    --font-body:    system-ui, -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x: hidden;
  }

  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ═══════════════════════════════════════════
     FIRE INTRO OVERLAY
  ═══════════════════════════════════════════ */
  #intro-overlay {
    position: fixed; inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #intro-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #fire-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .intro-title {
    position: relative;
    z-index: 2;
    text-align: center;
    user-select: none;
  }
  .intro-title h1 {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent2);
    letter-spacing: 0.05em;
  }
  .intro-title p {
    margin-top: 1rem;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* ═══════════════════════════════════════════
     LIQUID RIPPLE EFFECT
  ═══════════════════════════════════════════ */
  .ripple-ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%) scale(0);
    animation: ripple-expand 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    background: radial-gradient(circle, rgba(255,140,66,0.25) 0%, rgba(255,77,28,0.08) 60%, transparent 100%);
    border: 1.5px solid rgba(255,140,66,0.35);
  }
  @keyframes ripple-expand {
    to { transform: translate(-50%, -50%) scale(1); opacity: 0; }
  }

  /* ═══════════════════════════════════════════
     LAYOUT SHELL
  ═══════════════════════════════════════════ */
  #app { display: flex; min-height: 100vh; }

  /* ═══════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════ */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem;
    z-index: 200;
    gap: 1rem;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  #sidebar-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--text); display: flex; align-items: center; justify-content: center;
    padding: 6px; border-radius: 8px;
    transition: background 0.2s;
  }
  #sidebar-toggle:hover { background: var(--surface2); }
  .brand {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .brand span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 0.75rem; }
  .header-search {
    display: flex; align-items: center; gap: 0.4rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 10px;
  }
  .header-search input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 0.85rem; width: 160px;
  }
  .header-search input::placeholder { color: var(--text-muted); }
  .header-search svg { color: var(--text-muted); flex-shrink: 0; }

  #admin-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 8px;
    font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  #admin-btn:hover { background: var(--border); border-color: var(--accent); }

  /* ═══════════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════════ */
  #sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto; overflow-x: hidden;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 1.25rem 0.75rem;
    display: flex; flex-direction: column; gap: 1.5rem;
  }
  #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }

  .sidebar-section-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0 0.5rem; margin-bottom: 0.4rem;
  }
  .sidebar-group { display: flex; flex-direction: column; gap: 2px; }

  .sidebar-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    color: var(--text-muted); font-size: 0.88rem;
    transition: background 0.18s, color 0.18s;
    user-select: none;
  }
  .sidebar-item:hover, .sidebar-item.active {
    background: var(--surface2); color: var(--text);
  }
  .sidebar-item.active { color: var(--accent2); }
  .sidebar-item svg { flex-shrink: 0; }
  .sidebar-badge {
    margin-left: auto; background: var(--accent);
    color: #fff; font-size: 0.68rem; font-weight: 700;
    padding: 1px 6px; border-radius: 20px; min-width: 20px; text-align: center;
  }

  /* ═══════════════════════════════════════════
     MAIN CONTENT
  ═══════════════════════════════════════════ */
  #main {
    margin-top: var(--header-h);
    margin-left: var(--sidebar-w);
    flex: 1;
    transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
    min-height: calc(100vh - var(--header-h));
    display: flex; flex-direction: column;
  }
  #main.full { margin-left: 0; }

  .content-area {
    flex: 1;
    padding: 2rem 1.5rem;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  /* AdSense banners */
  .adsense-banner {
    width: 100%;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 0.78rem; letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.75rem;
  }
  .adsense-banner.leaderboard { height: 90px; }
  .adsense-banner.rectangle  { height: 250px; float: right; width: 300px; margin-left: 1.5rem; }

  /* Page title row */
  .page-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .page-header h2 {
    font-family: var(--font-display);
    font-size: 1.6rem; font-weight: 700;
    color: var(--text);
  }
  .page-header .tag {
    background: var(--accent); color: #fff;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 3px 9px; border-radius: 20px;
  }

  /* ═══════════════════════════════════════════
     EMPTY STATE
  ═══════════════════════════════════════════ */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; padding: 4rem 2rem; text-align: center;
    border: 1px dashed var(--border); border-radius: var(--radius);
    background: var(--surface);
  }
  .empty-state svg { color: var(--text-muted); opacity: 0.5; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text); font-weight: 600; }
  .empty-state p  { font-size: 0.875rem; color: var(--text-muted); max-width: 320px; line-height: 1.6; }
  .empty-state-btn {
    margin-top: 0.5rem;
    background: var(--accent); color: #fff;
    border: none; padding: 9px 22px; border-radius: 8px;
    font-size: 0.875rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .empty-state-btn:hover { background: var(--accent2); }

  /* ═══════════════════════════════════════════
     POST CARDS (for when posts exist)
  ═══════════════════════════════════════════ */
  .posts-grid { display: grid; gap: 1.25rem; }
  .post-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem 1.5rem;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .post-card:hover { border-color: var(--accent2); background: var(--surface2); }
  .post-card-cat {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 0.5rem;
  }
  .post-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
  .post-card p  { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }
  .post-card-meta {
    margin-top: 1rem; display: flex; gap: 1rem; align-items: center;
    font-size: 0.775rem; color: var(--text-muted);
  }
  .post-card-meta span { display: flex; align-items: center; gap: 4px; }

  /* ═══════════════════════════════════════════
     ADMIN MODAL
  ═══════════════════════════════════════════ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    opacity: 0; visibility: hidden;
    transition: opacity 0.25s, visibility 0.25s;
  }
  .modal-backdrop.open { opacity: 1; visibility: visible; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%; max-width: 380px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .modal-header h3 { font-size: 1.2rem; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    padding: 4px; border-radius: 6px; display: flex;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display: block; font-size: 0.8rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 0.45rem; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .form-group input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text);
    padding: 10px 13px; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent2); }
  .form-group input.error { border-color: #e05252; }

  .form-error {
    font-size: 0.8rem; color: #e05252; margin-top: 0.4rem;
    min-height: 1.1em;
  }

  .btn-primary {
    width: 100%; background: var(--accent);
    border: none; color: #fff; padding: 11px;
    border-radius: 9px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .btn-primary:hover  { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ═══════════════════════════════════════════
     ADMIN DASHBOARD (shown when logged in)
  ═══════════════════════════════════════════ */
  .admin-panel {
    display: none;
  }
  .admin-panel.visible { display: block; }

  .admin-panel .page-header h2 { color: var(--accent2); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem 1.25rem;
  }
  .stat-card .stat-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-bottom: 0.35rem;
  }
  .stat-card .stat-value {
    font-size: 2rem; font-weight: 700; color: var(--text);
  }
  .stat-card .stat-sub {
    font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;
  }

  .admin-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .action-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 8px 16px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .action-btn:hover { background: var(--border); border-color: var(--accent2); }
  .action-btn.danger { border-color: rgba(224,82,82,0.4); }
  .action-btn.danger:hover { background: rgba(224,82,82,0.12); border-color: #e05252; color: #e05252; }

  #logout-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: 1px solid rgba(224,82,82,0.4);
    color: #e05252; padding: 6px 14px; border-radius: 8px;
    font-size: 0.82rem; cursor: pointer;
    transition: background 0.2s;
  }
  #logout-btn:hover { background: rgba(224,82,82,0.1); }
  #logout-btn.hidden { display: none; }

  /* ═══════════════════════════════════════════
     FOOTER
  ═══════════════════════════════════════════ */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* ═══════════════════════════════════════════
     SIDEBAR OVERLAY (mobile)
  ═══════════════════════════════════════════ */
  #sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 99;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════════ */
  @media (max-width: 768px) {
    :root { --sidebar-w: 240px; }
    #main { margin-left: 0 !important; }
    #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay { display: block; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    #sidebar-overlay.open { opacity: 1; visibility: visible; }
    .header-search { display: none; }
    .adsense-banner.rectangle { float: none; width: 100%; margin-left: 0; }
  }

  @media (min-width: 769px) {
    #sidebar { transform: translateX(0) !important; }
    #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))) !important; }
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     FIRE INTRO OVERLAY
════════════════════════════════════ -->
<div id="intro-overlay">
  <canvas id="fire-canvas"></canvas>
  <div class="intro-title">
    <h1>Shadow Blogs</h1>
    <p>Tap anywhere to enter</p>
  </div>
</div>

<!-- ═══════════════════════════════════
     RIPPLE CONTAINER (appended via JS)
════════════════════════════════════ -->

<!-- ═══════════════════════════════════
     HEADER
════════════════════════════════════ -->
<header id="header">
  <div class="header-left">
    <button id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="brand">Shadow<span>Blogs</span></span>
  </div>

  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search posts…" />
  </div>

  <div class="header-right">
    <button id="admin-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Admin
    </button>
    <button id="logout-btn" class="hidden">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════
     SIDEBAR
════════════════════════════════════ -->
<div id="sidebar-overlay"></div>
<nav id="sidebar">

  <!-- Navigation -->
  <div>
    <div class="sidebar-section-label">Navigation</div>
    <div class="sidebar-group">
      <div class="sidebar-item active" data-page="home">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </div>
      <div class="sidebar-item" data-page="trending">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Trending
        <span class="sidebar-badge">3</span>
      </div>
      <div class="sidebar-item" data-page="latest">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Latest
      </div>
      <div class="sidebar-item" data-page="bookmarks">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Bookmarks
      </div>
    </div>
  </div>

  <!-- Categories -->
  <div>
    <div class="sidebar-section-label">Categories</div>
    <div class="sidebar-group">
      <div class="sidebar-item" data-page="tech">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="1
