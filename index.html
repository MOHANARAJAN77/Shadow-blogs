<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW BLOGS - PRO</title>
    <style>
        /* CSS Variables - Clean & Pro Theme */
        :root {
            --bg-color: #030303;
            --surface-color: #121212;
            --neon-white: #ffffff;
            --fire-color: #ff4500;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. Fire Intro Screen --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.5s ease;
        }
        #fireCanvas { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .intro-text-container { z-index: 1; text-align: center; }
        .intro-main { font-size: 70px; font-weight: 900; letter-spacing: 15px; text-shadow: 0 0 20px var(--fire-color); }
        .intro-sub { font-size: 50px; font-weight: 900; letter-spacing: 15px; margin-top: 10px; color: #fff; }

        /* --- 2. Liquid Fluid Effect (No Hard White Dot) --- */
        .liquid-ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
            filter: blur(15px); /* This makes it fluid, not a hard dot */
            animation: liquid-anim 0.8s ease-out forwards;
            z-index: 9999;
        }
        @keyframes liquid-anim {
            0% { transform: scale(0.2); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* --- 3. Navbar --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 40px; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
        .menu-btn { font-size: 30px; cursor: pointer; background: none; border: none; color: #fff; }

        /* --- 4. Sidebar --- */
        #sidebar {
            position: fixed; top: 0; right: -320px; width: 280px; height: 100vh;
            background: #0a0a0a; border-left: 1px solid #333;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000; padding: 40px; box-sizing: border-box;
        }
        #sidebar.open { right: 0; }
        .nav-item { 
            display: flex; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; 
            cursor: pointer; font-size: 18px; transition: 0.3s;
        }
        .nav-item:hover { color: var(--fire-color); padding-left: 10px; }

        /* --- 5. Content & Cards --- */
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; }
        .card { 
            background: #111; border-radius: 20px; padding: 30px; 
            border: 1px solid #222; transition: 0.4s; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--fire-color); }
        .card h3 { font-size: 22px; margin-bottom: 15px; }
        .btn-read { background: transparent; border: 1px solid #555; color: #fff; padding: 10px 20px; cursor: pointer; }
        
        /* Admin Styling */
        .admin-form { max-width: 600px; margin: 50px auto; background: #0c0c0c; padding: 40px; border-radius: 15px; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button.action { width: 100%; padding: 15px; background: #fff; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <canvas id="fireCanvas"></canvas>
        <div class="intro-text-container">
            <div class="intro-main">SHADOW</div>
            <div class="intro-sub">BLOGS</div>
        </div>
    </div>

    <header>
        <div class="logo">SHADOW BLOGS</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>

    <div id="sidebar">
        <div style="text-align: right; cursor: pointer;" onclick="toggleMenu()">Close ✕</div>
        <div style="margin-top: 50px;">
            <div class="nav-item" onclick="goHome(); toggleMenu()">🏠 Home</div>
            <div class="nav-item" onclick="showAdmin(); toggleMenu()">⚙️ Admin Access</div>
            <div id="category-list" style="margin-top: 30px;"></div>
        </div>
    </div>

    <div class="main-container">
        <div id="home-view" class="view active">
            <div class="blog-grid" id="blog-grid"></div>
        </div>

        <div id="admin-view" class="view">
            <div class="admin-form">
                <h2>Admin Control Panel</h2>
                <input type="text" id="p-title" placeholder="Blog Title">
                <select id="p-cat"></select>
                <textarea id="p-content" rows="6" placeholder="Your content..."></textarea>
                <button class="action" onclick="addPost()">Publish Post</button>
                <h3 style="margin-top: 40px;">Manage Posts</h3>
                <ul id="manage-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>

        <div id="article-view" class="view" style="max-width: 800px; margin: auto;">
            <button onclick="goHome()" class="btn-read">← Back</button>
            <h1 id="a-title"></h1>
            <p id="a-content"></p>
        </div>
    </div>

    <script>
        // --- 1. Initial Data Setup ---
        let posts = JSON.parse(localStorage.getItem('shadow_blogs_v4')) || [];
        const cats = ["Tech 💻", "Lifestyle 🛋️", "Food 🍽️", "Travel ✈️", "Business 💼"];

        // --- 2. Fire Effect Logic (Complete & Detailed) ---
        const canvas = document.getElementById('fireCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        function animateFire() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.push({x: Math.random()*canvas.width, y: canvas.height, size: Math.random()*6+2, life: 1});
            particles.forEach((p, i) => {
                p.y -= 3; p.life -= 0.02;
                ctx.fillStyle = `rgba(255, 69, 0, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animateFire);
        }
        animateFire();
        
        // Remove Intro
        setTimeout(() => { document.getElementById('intro-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('intro-overlay').style.display='none', 1000); }, 3000);

        // --- 3. Advanced Liquid Fluid Effect ---
        document.addEventListener('pointerdown', (e) => {
            // Ignore input/textarea interaction
            if(['INPUT','TEXTAREA','SELECT','BUTTON'].includes(e.target.tagName)) return;
            
            const ripple = document.createElement('div');
            ripple.className = 'liquid-ripple';
            const size = 100; // Liquid blob size
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (e.pageX - size/2) + 'px';
            ripple.style.top = (e.pageY - size/2) + 'px';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 800);
        });

        // --- 4. Navigation & Logic Functions ---
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function goHome() { switchView('home-view'); renderPosts(); }

        function renderPosts() {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = posts.map(p => `
                <div class="card">
                    <h3>${p.title}</h3>
                    <p style="color:#888;">${p.content.substring(0,60)}...</p>
                    <button class="btn-read" onclick="readPost('${p.id}')">Read More</button>
                </div>
            `).join('');
        }

        function showAdmin() {
            const p = prompt("Enter Admin Password:");
            if(p === "ShadowPirate36187522") {
                switchView('admin-view');
                const s = document.getElementById('p-cat');
                s.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
                renderManageList();
            } else { alert("Access Denied!"); }
        }

        function addPost() {
            const title = document.getElementById('p-title').value;
            const content = document.getElementById('p-content').value;
            const cat = document.getElementById('p-cat').value;
            if(title && content) {
                posts.unshift({id: Date.now(), title, content, cat});
                localStorage.setItem('shadow_blogs_v4', JSON.stringify(posts));
                alert("Posted!");
                renderManageList();
            }
        }

        function renderManageList() {
            const list = document.getElementById('manage-list');
            list.innerHTML = posts.map(p => `
                <li style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                    ${p.title} <button onclick="delPost(${p.id})">Delete</button>
                </li>
            `).join('');
        }

        function delPost(id) {
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('shadow_blogs_v4', JSON.stringify(posts));
            renderManageList();
            renderPosts();
        }

        function readPost(id) {
            const p = posts.find(x => x.id == id);
            if(p) {
                document.getElementById('a-title').innerText = p.title;
                document.getElementById('a-content').innerText = p.content;
                switchView('article-view');
            }
        }

        // Initialize
        goHome();
    </script>
</body>
</html>
