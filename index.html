<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shadow Blogs v2</title>
<style>
body{margin:0;font-family:system-ui;background:#0a0a0f;color:#eee}
#intro{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer}
#intro.hidden{display:none}
h1{color:#ff6a2b}
header{padding:12px 16px;background:#12121a;border-bottom:1px solid #333}
main{padding:20px}
.card{background:#12121a;border:1px solid #333;border-radius:12px;padding:16px;margin:12px 0}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#12121a;padding:20px}
.content{margin-left:240px}
@media(max-width:768px){.sidebar{display:none}.content{margin-left:0}}
</style>
</head>
<body>
<div id="intro"><h1>🔥 Shadow Blogs v2<br><small>Tap Anywhere</small></h1></div>
<div class="sidebar">
<h2>Shadow Blogs</h2>
<p>Home</p><p>Trending</p><p>Latest</p><p>Tech</p>
</div>
<div class="content">
<header>Shadow Blogs v2</header>
<main>
<div class="card"><h3>Welcome</h3><p>Your new Shadow Blogs template is running.</p></div>
<div class="card"><h3>No Posts</h3><p>Create posts from the admin panel.</p></div>
</main>
</div>
<script>
document.getElementById('intro').onclick=()=>document.getElementById('intro').classList.add('hidden');
document.addEventListener('click',e=>{
 const r=document.createElement('div');
 r.style.cssText='position:fixed;width:80px;height:80px;border-radius:50%;border:1px solid orange;left:'+(e.clientX-40)+'px;top:'+(e.clientY-40)+'px;pointer-events:none;opacity:1;transition:all .7s ease;';
 document.body.appendChild(r);
 requestAnimationFrame(()=>{r.style.transform='scale(2)';r.style.opacity='0';});
 setTimeout(()=>r.remove(),700);
});
</script>
</body>
</html>
