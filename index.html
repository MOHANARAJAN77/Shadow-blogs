                <!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW BLOGS</title>
    <style>
        /* 3D Tech Theme CSS */
        :root {
            --bg-color: #030303;
            --surface-color: rgba(20, 20, 20, 0.8);
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
        }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, #111 0%, #000 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Navbar */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { 
            font-size: 26px; font-weight: 900; letter-spacing: 3px; 
            text-shadow: 0 0 15px var(--accent-color); 
            color: #fff;
        }
        .menu-btn { font-size: 30px; cursor: pointer; background: none; border: none; color: white; transition: 0.3s; }
        .menu-btn:hover { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }
        
        /* Sidebar Menu */
        #sidebar {
            position: fixed; top: 0; right: -300px; width: 250px; height: 100vh;
            background: #0a0a0a; border-left: 1px solid var(--accent-color);
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 200; padding: 25px;
            box-shadow: -10px 0 30px rgba(0,255,204,0.1);
        }
        #sidebar.open { right: 0; }
        #sidebar ul { list-style: none; padding: 0; margin-top: 40px; }
        #sidebar ul li { margin: 25px 0; }
        #sidebar ul li a { color: white; text-decoration: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        #sidebar ul li a:hover { color: var(--accent-color); padding-left: 10px; }
        .close-btn { font-size: 30px; cursor: pointer; color: white; text-align: right; display: block; transition: 0.3s; }
        .close-btn:hover { color: red; }

        /* Filters */
        .filters { display: flex; gap: 15px; padding: 30px 20px; justify-content: center; flex-wrap: wrap; }
        .filter-btn {
            background: #151515; color: white; border: 1px solid #333; padding: 10px 25px;
            border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
            font-weight: bold; letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-color); color: #000; 
            box-shadow: 0 0 15px var(--accent-color);
            transform: translateY(-3px); border-color: var(--accent-color);
        }

        /* Grid & 3D Cards */
        .blog-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px; padding: 20px 50px 50px 50px;
            perspective: 1000px;
        }
        
        .card {
            background: var(--surface-color); border-radius: 15px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
            transform-style: preserve-3d;
            display: flex; flex-direction: column;
        }
        .card:hover {
            transform: translateY(-15px) rotateX(5deg) rotateY(2deg);
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.15);
            border-color: rgba(0, 255, 204, 0.5);
        }
        .card h2 { margin-top: 10px; font-size: 24px; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .card p { color: var(--text-muted); font-size: 15px; line-height: 1.6; flex-grow: 1; }
        .card .category { align-self: flex-start; background: #222; color: var(--accent-color); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #333; }
        .read-more { 
            background: transparent; border: 1px solid var(--accent-color); 
            color: var(--accent-color); padding: 10px 20px; border-radius: 8px; 
            cursor: pointer; transition: 0.3s; margin-top: 20px; font-weight: bold; align-self: flex-start;
        }
        .read-more:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 10px var(--accent-color); }

        /* SPA Views */
        .view { display: none; animation: fadeIn 0.6s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Article View */
        .article-view { max-width: 800px; margin: 0 auto; padding: 50px 20px; background: rgba(10,10,10,0.8); border-radius: 20px; margin-top: 40px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .article-view h1 { color: var(--accent-color); text-align: center; font-size: 36px; margin-bottom: 30px; }
        .article-view .content { color: #ddd; font-size: 18px; line-height: 1.8; }
        .back-btn { background: #222; color: white; border: 1px solid #444; padding: 10px 20px; cursor: pointer; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        /* Admin Section (Secured) */
        #admin-panel { background: #111; padding: 40px; border-radius: 15px; max-width: 600px; margin: 0 auto; border: 1px solid var(--accent-color); box-shadow: 0 0 30px rgba(0,255,204,0.1); }
        #admin-panel h2 { color: white; text-align: center; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 20px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent-color); }
        .btn-submit { background: var(--accent-color); color: #000; padding: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 8px; font-size: 18px; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 15px var(--accent-color); transform: scale(1.02); }

        /* AdSense Slot */
        .ad-slot { margin: 40px auto; max-width: 728px; height: 90px; background: #111; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px; border-radius: 10px; }
        
        /* Responsive */
        @media(max-width: 768px) {
            .blog-grid { padding: 20px; grid-template-columns: 1fr; }
            header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHADOW BLOGS</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>

    <div id="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <ul>
            <li><a onclick="goHome(); toggleMenu()">🏠 Home</a></li>
            <li><a onclick="promptAdmin(); toggleMenu()">⚙️ Admin Access</a></li>
        </ul>
    </div>

    <div id="home-view" class="view active">
        <div class="filters" id="filter-container"></div>
        <div class="ad-slot">Google AdSense Placeholder (728x90)</div>
        <div class="blog-grid" id="blog-grid"></div>
        <div class="ad-slot">Google AdSense Placeholder (728x90)</div>
    </div>

    <div id="article-view" class="view">
        <div class="article-view">
            <button class="back-btn" onclick="goHome()">← Back to Home</button>
            <h1 id="article-title"></h1>
            <div id="article-content" class="content"></div>
        </div>
    </div>

    <div id="admin-view" class="view">
        <div class="article-view" style="background: transparent; border: none; box-shadow: none; margin-top: 0;">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <div id="admin-panel">
                <h2>Create New Post</h2>
                <input type="text" id="post-title" placeholder="Enter Blog Title..." required>
                <select id="post-category">
                    <option value="Tech">Tech</option>
                    <option value="CyberSecurity">CyberSecurity</option>
                    <option value="AI">AI</option>
                    <option value="Food">Food</option>
                    <option value="Lifestyle">Lifestyle</option>
                </select>
                <textarea id="post-content" rows="10" placeholder="Write your awesome content here..." required></textarea>
                <button class="btn-submit" onclick="addPost()">Publish to Block</button>
            </div>
            
            <div id="admin-posts-list" style="margin-top: 50px; background: #111; padding: 20px; border-radius: 10px;">
                <h3 style="color: white; border-bottom: 1px solid #333; padding-bottom: 10px;">Manage Your Posts</h3>
                <ul id="manage-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>
    </div>

    <script>
        // பழைய டேட்டாவை நீக்கிவிட்டு புதிய கீ (shadow_blogs_v2) பயன்படுத்துகிறோம்.
        let posts = JSON.parse(localStorage.getItem('shadow_blogs_v2')) || [];
        const categories = ["All", "Tech", "CyberSecurity", "AI", "Food", "Lifestyle"];
        let currentFilter = "All";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            renderFilters();
            renderPosts();
            switchView('home-view');
        }

        // 🛡️ Secret Admin Login
        function promptAdmin() {
            const pin = prompt("Enter Admin PIN:");
            if(pin === "shadow") {
                renderAdminList();
                switchView('admin-view');
            } else {
                alert("Access Denied! You are not the admin.");
            }
        }

        // Filters UI
        function renderFilters() {
            const container = document.getElementById('filter-container');
            container.innerHTML = categories.map(cat => 
                `<button class="filter-btn ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</button>`
            ).join('');
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderFilters();
            renderPosts();
        }

        // Blog Grid UI
        function renderPosts() {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = '';
            
            const filtered = currentFilter === "All" ? posts : posts.filter(p => p.category === currentFilter);

            if(filtered.length === 0) {
                grid.innerHTML = `<p style="text-align:center; color:#555; width: 100%; font-size: 18px; grid-column: 1 / -1;">No blogs posted yet in this category.</p>`;
                return;
            }

            filtered.forEach(post => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="category">${post.category}</span>
                    <h2>${post.title}</h2>
                    <p>${post.content.substring(0, 120)}...</p>
                    <button class="read-more" onclick="readArticle('${post.id}')">Read More</button>
                `;
                grid.appendChild(card);
            });
        }

        // Full Article View
        function readArticle(id) {
            const post = posts.find(p => p.id === id);
            if(post) {
                document.getElementById('article-title').innerText = post.title;
                // Preserve line breaks
                document.getElementById('article-content').innerHTML = post.content.replace(/\\n/g, '<br>');
                switchView('article-view');
            }
        }

        // Admin Functions
        function addPost() {
            const title = document.getElementById('post-title').value.trim();
            const category = document.getElementById('post-category').value;
            const content = document.getElementById('post-content').value.trim();

            if(title && content) {
                const newPost = { id: Date.now().toString(), title, category, content };
                posts.unshift(newPost); // Latest post comes first
                localStorage.setItem('shadow_blogs_v2', JSON.stringify(posts));
                
                document.getElementById('post-title').value = '';
                document.getElementById('post-content').value = '';
                
                alert("Post Published Successfully!");
                renderAdminList();
            } else {
                alert("Title and Content cannot be empty.");
            }
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this post?")) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('shadow_blogs_v2', JSON.stringify(posts));
                renderAdminList();
            }
        }

        function renderAdminList() {
            const list = document.getElementById('manage-list');
            list.innerHTML = posts.map(post => 
                `<li style="background: #1a1a1a; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border: 1px solid #333;">
                    <span style="color: #fff; font-size: 16px;"><b>${post.title}</b> <span style="color:var(--text-muted); font-size:14px;">(${post.category})</span></span>
                    <button onclick="deletePost('${post.id}')" style="background: #ff3333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Delete</button>
                </li>`
            ).join('');
        }

        // Initialize App
        goHome();
    </script>
</body>
</html>
